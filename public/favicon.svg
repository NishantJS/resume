<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"><defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"></stop>
      <stop offset="100%" stop-color="#6d28d9"></stop>
    </linearGradient>

    <radialGradient id="dot-hi" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="drop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs><g filter="url(#drop)">
    <!--
      The arch: outer radius 76, inner radius 44 (stroke thickness = 32px).
      Left leg: x=22..54, right leg: x=146..178. Both legs bottom out at y=182.
      Arch centre at (100, 90).

      Constructed as a single closed path so the gradient flows across the whole glyph.
    -->
    <path d="
        M 22 182
        L 22 93
        Q 22 14 100 14
        Q 178 14 178 93
        L 178 182
        L 146 182
        L 146 100
        Q 146 46 100 46
        Q 54 46 54 100
        L 54 182
        Z
      " fill="url(#g1)"></path>

    <!-- Dot inside the hollow -->
    <circle cx="100" cy="152" r="17" fill="url(#g1)"></circle>
  </g><circle cx="100" cy="152" r="17" fill="url(#dot-hi)"></circle><path d="
      M 22 182
      L 22 93
      Q 22 14 100 14
      Q 178 14 178 93
      L 178 182
      L 146 182
      L 146 100
      Q 146 46 100 46
      Q 54 46 54 100
      L 54 182
      Z
    " fill="url(#dot-hi)" opacity="0.4"></path></svg>